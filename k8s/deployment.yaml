apiVersion: apps/v1
kind: Deployment
metadata:
  name: flutter-k8s-app
  labels:
    app: flutter-k8s-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flutter-k8s-app
  template:
    metadata:
      labels:
        app: flutter-k8s-app
    spec:
      containers:
      - name: flutter-nginx
        image: nicolasbosak/flutter-k8s-app:4e3505a01e0f08ba27856e9cbf9711936a6a74f6
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
