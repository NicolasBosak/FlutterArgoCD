name: "Terraform & Flutter CI (Plan)"

on:
  pull_request:
    paths-ignore:
      - '**/*.md'
  push:
    branches:
      - 'feature/*'
      - 'develop'

jobs:
  # 1. Llamada al Pipeline Modular (Etapa de Aplicación)
  # Esto ejecuta Lint, Test y Build en paralelo internamente
  flutter_app_ci:
    name: "Flutter App Pipeline"
    uses: ./.github/workflows/flutter-workflow.yml

  # 2. Etapa de Infraestructura (Se ejecuta en PARALELO a Flutter)
  terraform:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    env:
      TF_VAR_gcp_project_id: ${{ secrets.GCP_PROJECT_ID }}
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v3

      - name: "Authenticate to Google Cloud"
        uses: "google-github-actions/auth@v2"
        with:
          workload_identity_provider: "${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}"
          service_account: "${{ secrets.GCP_SERVICE_ACCOUNT }}"

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "1.5.0"

      - name: "Terraform Format"
        id: fmt
        run: terraform fmt -check

      - name: "Terraform Init"
        id: init
        run: terraform init

      - name: "Terraform Validate"
        id: validate
        run: terraform validate -no-color

      - name: "Terraform Plan"
        id: plan
        run: terraform plan -no-color
        continue-on-error: true

      - name: "Update Pull Request"
        uses: actions/github-script@v6
        if: github.event_name == 'pull_request'
        env:
          PLAN: "terraform\n${{ steps.plan.outputs.stdout }}"
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Terraform Format and Style 🖌\`${{ steps.fmt.outcome }}\`
            #### Terraform Initialization ⚙️\`${{ steps.init.outcome }}\`
            #### Terraform Plan 📖\`${{ steps.plan.outcome }}\`
            #### Terraform Validation 🤖\`${{ steps.validate.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`\n
            ${process.env.PLAN}
            \`\`\`

            </details>

            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: "Terraform Plan Status"
        if: steps.plan.outcome == 'failure'
        run: exit 1
